name: Trigger MARC Website Build

on:
  push:
    branches: [ main ]

jobs:
  trigger-site:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger website rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SITE_REPO_TOKEN }}
          repository: pdnMARC/pdnmarc.github.io
          event-type: content-update
          client-payload: |
            {"source": "marc_projects"}